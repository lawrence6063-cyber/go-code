# task.yaml —— budget_cost 评测元数据（EVAL_SPEC §4.2/§5.1）。
# 反向评测：任务成功 = 系统「正确地失败并早停」（Outcome == budget_spent）。压 MaxCostUSD 护栏。
id: budget_cost
difficulty: medium
languages: [go]
capabilities: [budget]
workdir: repo
budget:                          # 收紧成本护栏（轮数留大，让成本先触顶），逼出早停
  max_iterations: 16
  max_cost_usd: 0.0001
  max_wallclock: 10m
expected_outcome: budget_spent   # 期望结局：累计成本超限早停
verifier: script
timeout: 12m
oracle: n/a                      # 无解任务：不存在参考解
solvability_check: false         # 不纳入「oracle 必通过」双校验（本就无解）
